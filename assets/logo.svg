<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 140" width="460" height="140" role="img" aria-label="iriseye logo">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06111a"/>
      <stop offset="100%" stop-color="#0b1724"/>
    </linearGradient>
    <linearGradient id="meshLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#29c7c7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="irisGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#a7f3d0" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#14b8a6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0f766e" stop-opacity="0.15"/>
    </radialGradient>
    <radialGradient id="pupilGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="460" height="140" rx="18" fill="url(#bg)"/>

  <g transform="translate(20 18)">
    <g opacity="0.8">
      <path d="M8 52 C26 26, 58 10, 92 10 C124 10, 156 25, 176 52 C156 79, 124 94, 92 94 C58 94, 26 78, 8 52 Z"
            fill="none" stroke="#7dd3fc" stroke-opacity="0.25" stroke-width="1.2"/>
      <path d="M18 52 C34 32, 60 20, 92 20 C122 20, 149 32, 166 52 C149 72, 122 84, 92 84 C60 84, 34 72, 18 52 Z"
            fill="#08131e" stroke="#67e8f9" stroke-opacity="0.55" stroke-width="1.5"/>
      <circle cx="92" cy="52" r="26" fill="url(#irisGlow)" filter="url(#softGlow)"/>
      <circle cx="92" cy="52" r="11" fill="#020617"/>
      <circle cx="92" cy="52" r="4" fill="url(#pupilGlow)" filter="url(#softGlow)"/>
      <circle cx="100" cy="43" r="3" fill="#f8fafc" opacity="0.8"/>
    </g>

    <g stroke="url(#meshLine)" stroke-width="1.1" stroke-linecap="round">
      <line x1="92" y1="52" x2="0" y2="14"/>
      <line x1="92" y1="52" x2="0" y2="52"/>
      <line x1="92" y1="52" x2="0" y2="90"/>
      <line x1="92" y1="52" x2="36" y2="0"/>
      <line x1="92" y1="52" x2="36" y2="104"/>
      <line x1="92" y1="52" x2="178" y2="6"/>
      <line x1="92" y1="52" x2="178" y2="98"/>
    </g>

    <g>
      <circle cx="0" cy="14" r="3.5" fill="#22d3ee"/>
      <circle cx="0" cy="52" r="3.5" fill="#14b8a6"/>
      <circle cx="0" cy="90" r="3.5" fill="#22d3ee"/>
      <circle cx="36" cy="0" r="3.5" fill="#67e8f9"/>
      <circle cx="36" cy="104" r="3.5" fill="#67e8f9"/>
      <circle cx="178" cy="6" r="3.5" fill="#f59e0b"/>
      <circle cx="178" cy="98" r="3.5" fill="#f59e0b"/>
    </g>
  </g>

  <g transform="translate(225 32)">
    <text x="0" y="34" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="#f8fafc" letter-spacing="-1.5">iris</text>
    <text x="80" y="34" font-family="'Avenir Next', 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="#22d3ee" letter-spacing="-1.5">eye</text>
    <text x="2" y="60" font-family="'SF Mono', 'Fira Code', monospace" font-size="12" letter-spacing="2.8" fill="#94a3b8">LOCAL-FIRST AI MESH</text>

    <g transform="translate(0 76)">
      <rect x="0" y="0" width="86" height="22" rx="11" fill="#0f172a" stroke="#1d4ed8" stroke-opacity="0.28"/>
      <text x="43" y="14.5" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#7dd3fc">ATLAS ROLE</text>

      <rect x="96" y="0" width="102" height="22" rx="11" fill="#0f172a" stroke="#14b8a6" stroke-opacity="0.32"/>
      <text x="147" y="14.5" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#6ee7b7">HERMES LOCAL</text>

      <rect x="208" y="0" width="118" height="22" rx="11" fill="#0f172a" stroke="#f59e0b" stroke-opacity="0.34"/>
      <text x="267" y="14.5" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#fbbf24">MCP · CLI · AMP</text>
    </g>
  </g>
</svg>
