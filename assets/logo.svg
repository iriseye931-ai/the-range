<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1e1b4b" />
      <stop offset="40%" style="stop-color:#4c1d95" />
      <stop offset="100%" style="stop-color:#7c3aed" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="120" fill="#0a0a0f" rx="12"/>

  <!-- Mesh lines radiating from eye -->
  <g stroke="#4c1d95" stroke-width="0.5" opacity="0.4">
    <line x1="60" y1="60" x2="10" y2="20"/>
    <line x1="60" y1="60" x2="10" y2="60"/>
    <line x1="60" y1="60" x2="10" y2="100"/>
    <line x1="60" y1="60" x2="35" y2="10"/>
    <line x1="60" y1="60" x2="35" y2="110"/>
    <line x1="60" y1="60" x2="110" y2="10"/>
    <line x1="60" y1="60" x2="110" y2="110"/>
  </g>

  <!-- Eye shape outer glow -->
  <ellipse cx="60" cy="60" rx="48" ry="28" fill="url(#eyeGlow)" opacity="0.3"/>

  <!-- Eye white -->
  <path d="M 12 60 Q 60 20 108 60 Q 60 100 12 60 Z" fill="#0f0f1a" stroke="#7c3aed" stroke-width="1.5" filter="url(#glow)"/>

  <!-- Iris -->
  <circle cx="60" cy="60" r="20" fill="url(#iris)"/>

  <!-- Iris detail rings -->
  <circle cx="60" cy="60" r="20" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.6"/>
  <circle cx="60" cy="60" r="14" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.4"/>

  <!-- Pupil -->
  <circle cx="60" cy="60" r="8" fill="#050508"/>

  <!-- Pupil glow dot -->
  <circle cx="60" cy="60" r="3" fill="#c4b5fd" opacity="0.9" filter="url(#glow)"/>

  <!-- Light reflection -->
  <circle cx="65" cy="54" r="3" fill="white" opacity="0.6"/>

  <!-- Mesh node dots -->
  <circle cx="10" cy="20" r="2" fill="#7c3aed" opacity="0.7"/>
  <circle cx="10" cy="60" r="2" fill="#7c3aed" opacity="0.7"/>
  <circle cx="10" cy="100" r="2" fill="#7c3aed" opacity="0.7"/>
  <circle cx="35" cy="10" r="2" fill="#a78bfa" opacity="0.7"/>
  <circle cx="35" cy="110" r="2" fill="#a78bfa" opacity="0.7"/>
  <circle cx="110" cy="10" r="2" fill="#a78bfa" opacity="0.5"/>
  <circle cx="110" cy="110" r="2" fill="#a78bfa" opacity="0.5"/>

  <!-- Wordmark -->
  <text x="130" y="52" font-family="'SF Mono', 'Fira Code', monospace" font-size="36" font-weight="700" fill="#f5f3ff" letter-spacing="-1">iris</text>
  <text x="216" y="52" font-family="'SF Mono', 'Fira Code', monospace" font-size="36" font-weight="700" fill="#8b5cf6" letter-spacing="-1">eye</text>

  <!-- Tagline -->
  <text x="131" y="74" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="#6d28d9" letter-spacing="2">LOCAL AI MESH</text>

  <!-- Version badge area -->
  <rect x="130" y="84" width="120" height="18" rx="4" fill="#1e1b4b" opacity="0.6"/>
  <text x="190" y="97" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="#a78bfa" text-anchor="middle" letter-spacing="1">MCP · CLI · AMP</text>
</svg>
